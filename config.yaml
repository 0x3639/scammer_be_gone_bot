# Detection thresholds
detection:
  canonical_threshold: 1.0       # Exact canonical match
  homoglyph_threshold: 0.85      # Confusable character match
  fuzzy_levenshtein_threshold: 0.80
  fuzzy_jaro_winkler_threshold: 0.85
  fuzzy_partial_ratio_threshold: 0.90
  display_name_threshold: 0.95
  composite_threshold: 0.75      # Overall composite score

  # Composite score weights
  weights:
    canonical: 0.35
    homoglyph: 0.30
    fuzzy: 0.25
    display_name: 0.10

# Alert settings
alerts:
  cooldown_seconds: 3600         # 1 hour per user per group
  send_delay_seconds: 2          # Delay between alert sends

# Periodic scan interval (seconds)
periodic_scan_interval: 300      # 5 minutes
