services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - bot-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

volumes:
  bot-data:
